<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Play Dungeon Blitz</title>
  <script src="js/swfobject.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #game-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #game-stage,
    #game-container,
    #DungeonBlitz,
    object#DungeonBlitz,
    embed#DungeonBlitz,
    canvas#DungeonBlitz {
      display: block;
      width: min(100vw, 150vh) !important;
      height: min(100vh, 66.6667vw) !important;
      width: min(100dvw, 150dvh) !important;
      height: min(100dvh, 66.6667dvw) !important;
      aspect-ratio: 3 / 2;
      flex: 0 0 auto;
      margin: 0;
      border: 0;
      max-width: none;
      max-height: none;
      overflow: hidden;
      position: relative;
    }

    #game-stage > *,
    #game-stage object,
    #game-stage embed,
    #game-stage canvas,
    #game-stage > * > object,
    #game-stage > * > embed,
    #game-stage > * > canvas,
    #DungeonBlitz,
    object#DungeonBlitz,
    embed#DungeonBlitz,
    canvas#DungeonBlitz {
      display: block;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      margin: 0;
      border: 0;
    }

    #flash-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-family: sans-serif;
      text-align: center;
      pointer-events: none;
    }

    #fallback {
      display: none;
      color: #ccc;
      font-family: sans-serif;
      text-align: center;
      padding-top: 20vh;
    }

    a { color: #6cf; }
  </style>
</head>

<body>

  <div id="game-shell">
    <div id="game-stage">
      <div id="game-container"></div>
    </div>
  </div>

  <div id="flash-hint">
    <div>
      <p>Waiting for Adobe Flash Player…</p>
      <p style="font-size:0.9em; opacity:0.7">
        Click “Allow” in your browser’s address bar
      </p>
    </div>
  </div>

  <!-- Hard fallback if Flash is missing -->
  <div id="fallback">
    <h2>Adobe Flash Player Required</h2>
    <p>
      Enable Flash for this site when prompted,<br>
      or use the Flash Projector.
    </p>
    <p>
      • <a href="https://www.adobe.com/support/flashplayer/debug_downloads.html">
        Flash Projector (recommended)
      </a>
    </p>
  </div>

  <script>
    function normalizeGameLanguage(value) {
      const normalized = String(value || "").trim().toLowerCase();
      return normalized === "en" || normalized === "tr" ? normalized : "";
    }

    const urlLanguage = normalizeGameLanguage(new URLSearchParams(window.location.search).get("lang"));
    document.cookie = "db_lang=; path=/; max-age=0; SameSite=Lax";

    const languageParam = urlLanguage ? `&lang=${urlLanguage}` : "";
    const swfUrl = `p/cbp/DungeonBlitz.swf?fv=cbw&gv=cbw${languageParam}`;
    const localBridgeBaseUrl = "http://127.0.0.1:47631";
    const selfPresenceUrl = "/api/presence/self";
    const discordJoinUrl = "/api/presence/discord-join";
    const presencePollMs = 4000;
    const gameWidth = 1152;
    const gameHeight = 768;
    const gameAspectRatio = gameWidth / gameHeight;
    const localDiscordBridgeEnabled =
      window.location.protocol === "http:" || window.location.protocol === "https:";
    let lastPresenceHash = "";

    function showFallback() {
      document.getElementById("flash-hint").style.display = "none";
      document.getElementById("fallback").style.display = "block";
    }

    function hideHint() {
      const hint = document.getElementById("flash-hint");
      if (hint) hint.style.display = "none";
    }

    function getGameStage() {
      return document.getElementById("game-stage");
    }

    function isGameSurfaceCarrier(node) {
      return node instanceof HTMLElement &&
        node.id !== "game-shell" &&
        node.id !== "game-stage" &&
        node.id !== "flash-hint" &&
        node.id !== "fallback" &&
        node.tagName !== "SCRIPT" &&
        (
          node.matches("#DungeonBlitz, canvas, object, embed") ||
          !!node.querySelector("#DungeonBlitz, canvas, object, embed")
        );
    }

    function normalizeGameSurfaceElement(node) {
      if (!(node instanceof HTMLElement)) return;
      node.style.width = "100%";
      node.style.height = "100%";
      node.style.maxWidth = "100%";
      node.style.maxHeight = "100%";
      node.style.margin = "0";
      node.style.border = "0";
      node.style.display = "block";

      for (const child of node.querySelectorAll("canvas, object, embed")) {
        child.style.width = "100%";
        child.style.height = "100%";
        child.style.maxWidth = "100%";
        child.style.maxHeight = "100%";
        child.style.margin = "0";
        child.style.border = "0";
        child.style.display = "block";
      }
    }

    function syncGameStageSize() {
      const stage = getGameStage();
      if (!stage) return;

      const viewportWidth = document.documentElement.clientWidth || window.innerWidth;
      const viewportHeight = document.documentElement.clientHeight || window.innerHeight;
      let width = Math.min(viewportWidth, viewportHeight * gameAspectRatio);
      let height = width / gameAspectRatio;

      if (height > viewportHeight) {
        height = viewportHeight;
        width = height * gameAspectRatio;
      }

      stage.style.width = `${Math.round(width)}px`;
      stage.style.height = `${Math.round(height)}px`;

      const detachedSurface = Array.from(document.body.children).find(isGameSurfaceCarrier);
      if (detachedSurface && detachedSurface.parentElement === document.body) {
        stage.replaceChildren(detachedSurface);
      }

      const surface = stage.firstElementChild;
      if (surface) {
        normalizeGameSurfaceElement(surface);
      }
    }

    async function postToLocalBridge(path, body) {
      try {
        await fetch(`${localBridgeBaseUrl}${path}`, {
          method: "POST",
          mode: "cors",
          cache: "no-store",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          keepalive: true
        });
      } catch (_error) {
        // Local bridge is optional; ignore when it is not running.
      }
    }

    async function syncDiscordPresence() {
      if (!localDiscordBridgeEnabled) {
        return;
      }

      try {
        const response = await fetch(selfPresenceUrl, {
          cache: "no-store",
          credentials: "same-origin"
        });

        if (!response.ok) {
          if (lastPresenceHash) {
            lastPresenceHash = "";
            await postToLocalBridge("/clear", { clear: true });
          }
          return;
        }

        const payload = await response.json();
        const session = payload && payload.session ? payload.session : null;
        if (!session) {
          if (lastPresenceHash) {
            lastPresenceHash = "";
            await postToLocalBridge("/clear", { clear: true });
          }
          return;
        }

        const bridgePayload = {
          characterName: session.characterName,
          details: session.details,
          state: session.state,
          startedAtMs: session.startedAtMs,
          partySize: session.partySize,
          partyId: session.partyId,
          partyMax: session.partyMax,
          partyLocked: session.partyLocked,
          joinSecret: session.joinSecret,
          levelKey: session.levelKey,
          activityKind: session.activityKind,
          presenceUrl: new URL(selfPresenceUrl, window.location.origin).toString(),
          joinUrl: new URL(discordJoinUrl, window.location.origin).toString()
        };
        const nextHash = JSON.stringify(bridgePayload);
        if (nextHash === lastPresenceHash) {
          return;
        }

        lastPresenceHash = nextHash;
        await postToLocalBridge("/presence", bridgePayload);
      } catch (_error) {
        // Keep polling; game must continue even if presence sync fails.
      }
    }

    // Attempt native Flash immediately
    swfobject.embedSWF(
      swfUrl,
      "game-container",
      "1152",
      "768",
      "10.0.0",
      null,
      { fv: "cbw", gv: "cbw" },
      { allowScriptAccess: "always", allowFullScreen: "true" },
      { id: "DungeonBlitz", name: "DungeonBlitz" },
      function (e) {
        if (!e.success) {
          // Flash not installed or unavailable
          showFallback();
          return;
        }
        syncGameStageSize();
      }
    );

    // Give Flash time to initialize after permission
    const gameSurfaceObserver = new MutationObserver(syncGameStageSize);
    gameSurfaceObserver.observe(document.body, { childList: true, subtree: true });
    window.addEventListener("resize", syncGameStageSize);
    syncGameStageSize();
    setTimeout(syncGameStageSize, 100);
    setTimeout(syncGameStageSize, 1000);
    setTimeout(hideHint, 2500);
    if (localDiscordBridgeEnabled) {
      setTimeout(syncDiscordPresence, 2500);
      setInterval(syncDiscordPresence, presencePollMs);
    }

    window.addEventListener("beforeunload", function () {
      if (!localDiscordBridgeEnabled || !lastPresenceHash) return;
      void postToLocalBridge("/clear", { clear: true });
    });
  </script>
</body>
</html>
