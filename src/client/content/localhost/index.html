<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Play Dungeon Blitz</title>
  <script src="js/swfobject.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #484955;
      overflow: auto;
    }

    body {
      min-width: 1152px;
      min-height: 768px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body.fullscreen {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    #game-shell {
      position: relative;
      width: 1152px;
      height: 768px;
      overflow: hidden;
    }

    body.fullscreen #game-shell {
      position: fixed;
      left: 50%;
      top: 50%;
      width: var(--game-fullscreen-width, 1152px);
      height: var(--game-fullscreen-height, 768px);
      transform: translate(-50%, -50%);
      transform-origin: center center;
    }

    #game-container,
    #DungeonBlitz,
    object#DungeonBlitz,
    embed#DungeonBlitz {
      display: block;
      width: 100% !important;
      height: 100% !important;
      margin: 0;
      border: 0;
      max-width: none;
      max-height: none;
    }

    #flash-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-family: sans-serif;
      text-align: center;
      pointer-events: none;
    }

    #fallback {
      display: none;
      color: #ccc;
      font-family: sans-serif;
      text-align: center;
      padding-top: 20vh;
    }

    a { color: #6cf; }
  </style>
</head>

<body>

  <div id="game-shell">
    <div id="game-container"></div>
  </div>

  <div id="flash-hint">
    <div>
      <p>Waiting for Adobe Flash Player…</p>
      <p style="font-size:0.9em; opacity:0.7">
        Click “Allow” in your browser’s address bar
      </p>
    </div>
  </div>

  <!-- Hard fallback if Flash is missing -->
  <div id="fallback">
    <h2>Adobe Flash Player Required</h2>
    <p>
      Enable Flash for this site when prompted,<br>
      or use the Flash Projector.
    </p>
    <p>
      • <a href="https://www.adobe.com/support/flashplayer/debug_downloads.html">
        Flash Projector (recommended)
      </a>
    </p>
  </div>

  <script>
    function normalizeGameLanguage(value) {
      const normalized = String(value || "").trim().toLowerCase();
      return normalized === "en" || normalized === "tr" ? normalized : "";
    }

    const urlLanguage = normalizeGameLanguage(new URLSearchParams(window.location.search).get("lang"));
    document.cookie = "db_lang=; path=/; max-age=0; SameSite=Lax";

    const languageParam = urlLanguage ? `&lang=${urlLanguage}` : "";
    const swfUrl = `p/cbp/DungeonBlitz.swf?fv=cbw&gv=cbv${languageParam}`;
    const localBridgeBaseUrl = "http://127.0.0.1:47631";
    const selfPresenceUrl = "/api/presence/self";
    const discordJoinUrl = "/api/presence/discord-join";
    const presencePollMs = 4000;
    const localDiscordBridgeEnabled =
      window.location.protocol === "http:" || window.location.protocol === "https:";
    let lastPresenceHash = "";

    function showFallback() {
      document.getElementById("flash-hint").style.display = "none";
      document.getElementById("fallback").style.display = "block";
    }

    function hideHint() {
      const hint = document.getElementById("flash-hint");
      if (hint) hint.style.display = "none";
    }

    const originalGameWidth = 1152;
    const originalGameHeight = 768;

    function applyDungeonBlitzFullscreenSize(scale) {
      const width = Math.max(originalGameWidth, Math.floor(originalGameWidth * scale / 6) * 6);
      const height = Math.round(width * originalGameHeight / originalGameWidth);
      const adjustedScale = width / originalGameWidth;
      document.documentElement.style.setProperty("--game-fullscreen-scale", String(adjustedScale));
      document.documentElement.style.setProperty("--game-fullscreen-width", `${width}px`);
      document.documentElement.style.setProperty("--game-fullscreen-height", `${height}px`);
    }

    function resetDungeonBlitzFullscreenSize() {
      document.documentElement.style.setProperty("--game-fullscreen-scale", "1");
      document.documentElement.style.setProperty("--game-fullscreen-width", `${originalGameWidth}px`);
      document.documentElement.style.setProperty("--game-fullscreen-height", `${originalGameHeight}px`);
    }

    function updateDungeonBlitzFullscreenScale() {
      const widthScale = window.innerWidth / originalGameWidth;
      const heightScale = window.innerHeight / originalGameHeight;
      const nextScale = Math.max(1, Math.min(widthScale, heightScale));
      applyDungeonBlitzFullscreenSize(nextScale);
    }

    function setDungeonBlitzFullscreen(enabled) {
      const shouldEnable = Boolean(enabled);
      document.body.classList.toggle("fullscreen", shouldEnable);

      if (shouldEnable) {
        updateDungeonBlitzFullscreenScale();
        const requestFullscreen = document.documentElement.requestFullscreen;
        if (requestFullscreen && !document.fullscreenElement) {
          const request = requestFullscreen.call(document.documentElement);
          if (request && typeof request.catch === "function") {
            void request.catch(function () {});
          }
        }
      } else if (document.exitFullscreen && document.fullscreenElement) {
        const exit = document.exitFullscreen();
        if (exit && typeof exit.catch === "function") {
          void exit.catch(function () {});
        }
      } else {
        resetDungeonBlitzFullscreenSize();
      }
    }

    window.setDungeonBlitzFullscreen = setDungeonBlitzFullscreen;

    async function postToLocalBridge(path, body) {
      try {
        await fetch(`${localBridgeBaseUrl}${path}`, {
          method: "POST",
          mode: "cors",
          cache: "no-store",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          keepalive: true
        });
      } catch (_error) {
        // Local bridge is optional; ignore when it is not running.
      }
    }

    async function syncDiscordPresence() {
      if (!localDiscordBridgeEnabled) {
        return;
      }

      try {
        const response = await fetch(selfPresenceUrl, {
          cache: "no-store",
          credentials: "same-origin"
        });

        if (!response.ok) {
          if (lastPresenceHash) {
            lastPresenceHash = "";
            await postToLocalBridge("/clear", { clear: true });
          }
          return;
        }

        const payload = await response.json();
        const session = payload && payload.session ? payload.session : null;
        if (!session) {
          if (lastPresenceHash) {
            lastPresenceHash = "";
            await postToLocalBridge("/clear", { clear: true });
          }
          return;
        }

        const bridgePayload = {
          characterName: session.characterName,
          details: session.details,
          state: session.state,
          startedAtMs: session.startedAtMs,
          partySize: session.partySize,
          partyId: session.partyId,
          partyMax: session.partyMax,
          partyLocked: session.partyLocked,
          joinSecret: session.joinSecret,
          levelKey: session.levelKey,
          activityKind: session.activityKind,
          presenceUrl: new URL(selfPresenceUrl, window.location.origin).toString(),
          joinUrl: new URL(discordJoinUrl, window.location.origin).toString()
        };
        const nextHash = JSON.stringify(bridgePayload);
        if (nextHash === lastPresenceHash) {
          return;
        }

        lastPresenceHash = nextHash;
        await postToLocalBridge("/presence", bridgePayload);
      } catch (_error) {
        // Keep polling; game must continue even if presence sync fails.
      }
    }

    // Attempt native Flash immediately
    swfobject.embedSWF(
      swfUrl,
      "game-container",
      "100%",
      "100%",
      "10.0.0",
      null,
      { fv: "cbq", gv: "cbp" },
      { allowScriptAccess: "always", allowFullScreen: "true", scale: "noscale", salign: "tl", quality: "best", wmode: "direct" },
      { id: "DungeonBlitz", name: "DungeonBlitz" },
      function (e) {
        if (!e.success) {
          // Flash not installed or unavailable
          showFallback();
        }
      }
    );

    // Give Flash time to initialize after permission
    setTimeout(hideHint, 2500);
    if (localDiscordBridgeEnabled) {
      setTimeout(syncDiscordPresence, 2500);
      setInterval(syncDiscordPresence, presencePollMs);
    }

    document.addEventListener("fullscreenchange", function () {
      if (!document.fullscreenElement) {
        document.body.classList.remove("fullscreen");
        resetDungeonBlitzFullscreenSize();
      } else if (document.body.classList.contains("fullscreen")) {
        updateDungeonBlitzFullscreenScale();
      }
    });

    window.addEventListener("resize", function () {
      if (document.body.classList.contains("fullscreen")) {
        updateDungeonBlitzFullscreenScale();
      }
    });

    window.addEventListener("beforeunload", function () {
      if (!localDiscordBridgeEnabled || !lastPresenceHash) return;
      void postToLocalBridge("/clear", { clear: true });
    });
  </script>
</body>
</html>
